<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #fff;
            padding-bottom: 10px;
            font-size: 18px;
            letter-spacing: 2px;
            flex-shrink: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(14, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 4px;
            flex: 1;
            margin-top: 15px;
        }

        .box-btn {
            background-color: #000;
            border: 1px solid #fff;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box-btn:hover {
            background-color: #fff;
            color: #000;
        }

        .box-btn.active {
            background-color: #fff;
            color: #000;
        }

        /* Password modal */
        .modal {
            display: flex;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #000;
            border: 2px solid #fff;
            padding: 40px;
            text-align: center;
            max-width: 400px;
        }

        .modal-content h1 {
            color: #fff;
            margin-bottom: 30px;
            font-size: 20px;
            letter-spacing: 2px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background-color: #000;
            border: 2px solid #fff;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .modal-content input::placeholder {
            color: #fff;
            opacity: 0.5;
        }

        .modal-content button {
            width: 100%;
            padding: 12px;
            background-color: #000;
            border: 2px solid #fff;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 1px;
        }

        .modal-content button:hover {
            background-color: #fff;
            color: #000;
        }

        .error-message {
            color: #fff;
            margin-top: 15px;
            font-size: 12px;
            display: none;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Password Modal -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <h1>ACCESS REQUIRED</h1>
            <input 
                type="password" 
                id="passwordInput" 
                placeholder="ENTER PASSWORD" 
                autocomplete="off"
            >
            <button onclick="checkPassword()">ENTER</button>
            <div class="error-message" id="errorMessage">INVALID PASSWORD</div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="mainContent" class="hidden">
        <div class="container">
            <div class="header">[ SOUND TERMINAL ]</div>
            <div class="grid" id="grid"></div>
        </div>
    </div>

    <script>
        const PASSWORD = "kewl69";
        let accessGranted = false;

        document.getElementById("passwordInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkPassword();
            }
        });

        function checkPassword() {
            const input = document.getElementById("passwordInput").value;
            const errorMsg = document.getElementById("errorMessage");

            if (input === PASSWORD) {
                accessGranted = true;
                document.getElementById("passwordModal").classList.add("hidden");
                document.getElementById("mainContent").classList.remove("hidden");
                initializeGrid();
                document.getElementById("passwordInput").value = "";
            } else {
                errorMsg.style.display = "block";
                document.getElementById("passwordInput").value = "";
                document.getElementById("passwordInput").focus();
            }
        }

        function initializeGrid() {
            const grid = document.getElementById("grid");
            grid.innerHTML = "";

            for (let i = 0; i < 112; i++) {
                const number = 345 + i;
                const btn = document.createElement("button");
                btn.className = "box-btn";
                btn.textContent = number;
                btn.dataset.number = number;

                if (number % 7 === 0) {
                    btn.addEventListener("click", function() {
                        playMusic(number);
                    });
                } else {
                    btn.addEventListener("click", function() {
                        showActive(this);
                    });
                }

                grid.appendChild(btn);
            }
        }

        function playMusic(number) {
            const btn = document.querySelector(`[data-number="${number}"]`);
            
            btn.classList.add("active");
            
            const musicFile = `music_${number}.mp3`;
            const audio = new Audio(musicFile);
            audio.play().catch(err => {
                console.log(`Music file not found or error: ${musicFile}`);
            });

            setTimeout(() => {
                btn.classList.remove("active");
            }, 200);
        }

        function showActive(btn) {
            btn.classList.add("active");
            setTimeout(() => {
                btn.classList.remove("active");
            }, 150);
        }

        window.addEventListener("load", function() {
            document.getElementById("passwordInput").focus();
        });
    </script>
</body>
</html>
